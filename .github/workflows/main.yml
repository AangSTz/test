name: Decompile SO
on: [push]

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Ghidra
        run: |
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.1_build/ghidra_11.1_PUBLIC_20240607.zip
          unzip -q ghidra_*.zip

      - name: Create Decompile Script
        run: |
          mkdir -p $HOME/output
          cat > DecompileAll.java << 'EOF'
          //@category Analysis
          import ghidra.app.decompiler.*;
          import ghidra.program.model.listing.*;
          import java.io.*;

          public class DecompileAll extends GhidraScript {
              public void run() throws Exception {
                  String outPath = System.getProperty("user.home") + "/output/decompiled_output.c";
                  DecompInterface decomp = new DecompInterface();
                  decomp.openProgram(currentProgram);
                  PrintWriter out = new PrintWriter(new FileWriter(outPath));
                  for (Function f : currentProgram.getFunctionManager().getFunctions(true)) {
                      DecompileResults res = decomp.decompileFunction(f, 60, monitor);
                      if (res != null && res.decompileCompleted()) {
                          out.println("// === " + f.getName() + " ===");
                          out.println(res.getDecompiledFunction().getC());
                      }
                  }
                  out.close();
                  println("Saved to: " + outPath);
              }
          }
          EOF

      - name: Run Ghidra Headless
        run: |
          ./ghidra_11.1_PUBLIC/support/analyzeHeadless \
            /tmp ghidraProject \
            -import libMultiplayer.so \
            -postScript DecompileAll.java \
            -scriptPath $(pwd) \
            -deleteProject

      - name: Debug - Find output
        run: find $HOME/output -type f && ls -lh $HOME/output/ || echo "Output folder empty!"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-output
          path: ~/output/decompiled_output.c
