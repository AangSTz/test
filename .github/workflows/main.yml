name: Decompile
on: [push]

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Ghidra
        run: |
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.1_build/ghidra_11.1_PUBLIC_20240607.zip
          unzip -q ghidra_*.zip
          
      - name: Run Ghidra Headless
        run: |
          ./ghidra_11.1_PUBLIC/support/analyzeHeadless /tmp myProject \
            -import libMultiplayer.so \
            -postScript DecompileAllFunctions.java \
            -scriptPath . \
            -noanalysis false
            
      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: decompiled-output
          path: output/
